    <div class="content-wrapper">
      <div class="row justify-content-sm-center">
        <div class="col-md-6 col-lg-6">
          <div class="card form-box">
            <h2 align="center">Register To List Your Shop</h2>
            <form class="form">
              <div class="form-group">
                <label>Name:</label>
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  aria-describedby="emailHelp"
                  placeholder="Full Name"
                  name="name"
                  required
                />
              </div>
              <div class="form-group">
                <label>Mobile number:</label>
                <input
                  type="number"
                  class="form-control"
                  id="number"
                  placeholder="Number"
                  pattern="^((\+91)?|91)?[789][0-9]{9}"
                  minlength="1111111111"
                  maxlength="9999999999"
                  name="number"
                  required
                />
              </div>
              <div class="form-group">
                <label>Address:</label>
                <textarea
                  class="form-control"
                  id="address"
                  placeholder="e.g. Plot no 2, xyz road, Nashik"
                  rows="3"
                  name="address"
                  required
                ></textarea>
              </div>
              <div class="form-group">
                <label>Pincode:</label>
                <input
                  type="number"
                  class="form-control"
                  id="pincode"
                  placeholder="e.g. 422007"
                  name="pincode"
                  required
                />
              </div>
              <div class="submit-btn">
                <button type="submit" class="btn btn-success">Submit</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
